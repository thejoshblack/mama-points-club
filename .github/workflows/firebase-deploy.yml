name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: hosting:deploy --project mama-points-club
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
